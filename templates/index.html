<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Admin Login</title>
  <script src="{{ url_for('static', filename='js/api.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/auth.js') }}" defer></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Roboto', sans-serif; 
      background-color: #f5f5f5;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen">
  <div class="bg-white p-12 rounded-xl shadow-2xl w-full max-w-lg mx-4">
    <!-- Header with Icon and Title -->
    <div class="flex items-center justify-center mb-8">
      <img src="static/images/logo.png" alt="MediChain Logo" class="w-12 h-12 mr-3 object-contain">
      <h1 class="text-3xl font-medium" style="color: #2181d5;">MediChain</h1>
    </div>
    
    <!-- Login Form Header -->
    <div class="text-center mb-8">
      <h2 class="text-2xl font-medium text-gray-800 mb-3">Admin Login</h2>
      <p class="text-gray-500 text-base">Enter your credentials to access the lab dashboard.</p>
    </div>
    
    <!-- Form -->
    <form id="loginForm" class="space-y-6">
      <!-- Email Field -->
      <div>
        <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Username</label>
        <input 
          type="username" 
          id="username" 
          
          class="w-full px-4 py-3 bg-white border border-gray-300 rounded-md text-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        >
      </div>
      
      <!-- Password Field -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
        <input 
          type="password" 
          id="password" 
          
          class="w-full px-4 py-3 bg-white border border-gray-300 rounded-md text-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        >
      </div>
      
      <!-- Sign In Button -->
      <button 
        type="submit" 
        class="w-full text-white py-3 px-4 rounded-md font-medium text-sm transition-colors"
        style="background-color: #145a97;"
        onmouseover="this.style.backgroundColor='#1976d2'"
        onmouseout="this.style.backgroundColor='#1e88e5'"
      >
        Sign In
      </button>
    </form>
    
    <!-- Error Message -->
    <p id="error" class="text-red-500 text-center text-sm mt-4 hidden"></p>
    
  </div>
</body>
</html>
